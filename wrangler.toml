# Cloudflare Worker 配置文件
# 更多配置选项: https://developers.cloudflare.com/workers/wrangler/configuration/

# Worker 名称(修改为你想要的名称)
name = "cloudflare-search"

# Worker 主文件
main = "worker.js"

# 兼容日期 - 锁定 Workers 运行时行为
# 使用你开发时的日期,避免未来行为变更影响你的代码
compatibility_date = "2024-12-04"

# 自动使用 workers.dev 子域名
# 设置为 true 会自动分配一个 xxx.workers.dev 域名
workers_dev = true

# 账号 ID (可选,部署时会自动填充)
# account_id = "your-account-id"

# ============================================
# 路由配置(可选)
# ============================================
# Dashboard 已绑定的自定义域名；保留在配置中，避免后续 wrangler deploy 时丢失触发器。
routes = [
  { pattern = "search.endday.top", custom_domain = true, zone_name = "endday.top" }
]

# ============================================
# 环境变量(可选)
# ============================================
[vars]
# API 访问令牌(可选)
# 配置后，所有 /search 请求都需要提供此 token 进行鉴权
# 可以通过 Authorization header (Bearer token) 或 query 参数 (?token=xxx) 传递
# TOKEN = ""

# 搜索网关配置(可选)
# DEFAULT_ENGINES = "startpage,duckduckgo,brave,mojeek,bing"
# DEFAULT_TIMEOUT = "4000"
# HEDGED_FALLBACK_DELAY_MS = "400"
# FALLBACK_MIN_RESULTS = "6"
# FALLBACK_MIN_CONTRIBUTING_ENGINES = "2"
# CACHE_TTL_SECONDS = "300"
# STALE_CACHE_TTL_SECONDS = "1800"
# RATE_LIMIT_WINDOW_SECONDS = "60"
# RATE_LIMIT_MAX_REQUESTS = "60"
# HEALTH_FAILURE_THRESHOLD = "2"
# HEALTH_COOLDOWN_SECONDS = "180"
# HEALTH_STATE_TTL_SECONDS = "3600"

# Cloudflare Browser Rendering Markdown API (optional)
# Used by /markdown. Create an API token with Browser Rendering - Edit permission.
# CF_BROWSER_RENDERING_ACCOUNT_ID = "your-account-id"
# CF_BROWSER_RENDERING_API_TOKEN = "your-browser-rendering-api-token"

# ============================================
# KV 缓存绑定(可选)
# ============================================
# 创建命令: wrangler kv namespace create SEARCH_KV
# [[kv_namespaces]]
# binding = "SEARCH_KV"
# id = "your-kv-namespace-id"

# ============================================
# KV 状态绑定(可选)
# ============================================
# 用于跨 isolate 共享限流计数和引擎健康度
# 创建命令: wrangler kv namespace create SEARCH_STATE_KV
# [[kv_namespaces]]
# binding = "SEARCH_STATE_KV"
# id = "your-state-kv-namespace-id"

# ============================================
# 环境配置(可选)
# ============================================
# 生产环境配置
# [env.production]
# name = "cloudflare-search-prod"
# workers_dev = false
# routes = [
#   { pattern = "search.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# 开发环境配置
# [env.staging]
# name = "cloudflare-search-staging"
# workers_dev = true

# ============================================
# 资源限制(可选)
# ============================================
# 限制 CPU 时间(毫秒)
# limits = { cpu_ms = 50 }

# ============================================
# 观察性配置(可选)
# ============================================
# 启用日志推送
# [observability]
# enabled = true
